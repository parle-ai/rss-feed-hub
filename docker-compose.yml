services:
  rsshub:
    image: diygod/rsshub:chromium-bundled
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - BILIBILI_COOKIE=${BILIBILI_COOKIE:-}
      - BILIBILI_COOKIE_3690992282634800=${BILIBILI_COOKIE_3690992282634800:-}
      - XIAOHONGSHU_COOKIE=${XIAOHONGSHU_COOKIE:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:1200/ || exit 1"]
      interval: 30s
      start_period: 60s
      timeout: 10s
      retries: 3

  miniflux:
    image: miniflux/miniflux:latest
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://miniflux:${DB_PASSWORD}@db/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - POLLING_FREQUENCY=15
      - FETCHER_ALLOW_PRIVATE_NETWORKS=1
      - GOOGLE_READER=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=miniflux
    volumes:
      - miniflux-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  miniflux-db:
